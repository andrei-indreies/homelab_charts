apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "headscale.fullname" . }}
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "headscale.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.headscale.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "headscale.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "headscale.serviceAccountName" . }}
      {{- with .Values.headscale.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.headscale.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-chown-data
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 10001:10001 /var/lib/headscale
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          volumeMounts:
            - name: data
              mountPath: /var/lib/headscale
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      containers:
        - name: headscale
          securityContext:
            {{- toYaml .Values.headscale.securityContext | nindent 12 }}
          image: "{{ .Values.headscale.image.repository }}:{{ .Values.headscale.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.headscale.image.pullPolicy }}
          command:
            - headscale
            - serve
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 50443
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            {{- if .Values.headscale.config.derp.server.enabled }}
            - name: stun
              containerPort: 3478
              protocol: UDP
            {{- end }}
          startupProbe:
            {{- toYaml .Values.headscale.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.headscale.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.headscale.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.headscale.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/headscale/config.yaml
              subPath: headscale-config.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/headscale
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/headscale
            {{- if and .Values.headscale.config.oidc.enabled .Values.headscale.config.oidc.clientSecret }}
            - name: secrets
              mountPath: /etc/headscale/secrets/oidc-client-secret
              subPath: oidc-client-secret
              readOnly: true
            {{- end }}
            {{- if .Values.headscale.tls.enabled }}
            - name: tls
              mountPath: /etc/headscale/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "headscale.fullname" . }}-config
        - name: data
          {{- if and (eq .Values.headscale.database.type "sqlite") .Values.headscale.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.headscale.persistence.existingClaim | default (printf "%s-data" (include "headscale.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        {{- if and .Values.headscale.config.oidc.enabled .Values.headscale.config.oidc.clientSecret }}
        - name: secrets
          secret:
            secretName: {{ include "headscale.fullname" . }}-secrets
            items:
              - key: oidc-client-secret
                path: oidc-client-secret
        {{- end }}
        {{- if .Values.headscale.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.headscale.tls.existingSecret }}
        {{- end }}
      {{- with .Values.headscale.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.headscale.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.headscale.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
