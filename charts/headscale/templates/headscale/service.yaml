apiVersion: v1
kind: Service
metadata:
  name: {{ include "headscale.fullname" . }}
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
    {{- with .Values.headscale.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.headscale.service.type }}
  ports:
    - port: {{ .Values.headscale.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.headscale.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "headscale.selectorLabels" . | nindent 4 }}
