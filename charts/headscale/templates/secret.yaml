{{- $hasOidcSecret := and .Values.headscale.config.oidc.enabled (not (empty .Values.headscale.config.oidc.clientSecret)) -}}
{{- $hasPostgres := and (eq .Values.headscale.database.type "postgres") (not (empty .Values.headscale.database.postgres.connectionString)) -}}
{{- $hasApiKey := not (empty .Values.headplane.config.apiKey) -}}
{{- $hasCookieSecret := not (empty .Values.headplane.config.cookieSecret) -}}
{{/* Auto-generate cookie secret if not provided and no existing secret found */}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" (include "headscale.fullname" .)) -}}
{{- $cookieSecret := "" -}}
{{- if $hasCookieSecret -}}
  {{- $cookieSecret = .Values.headplane.config.cookieSecret -}}
{{- else if and $existingSecret (hasKey $existingSecret.data "headplane-cookie-secret") -}}
  {{- $cookieSecret = index $existingSecret.data "headplane-cookie-secret" | b64dec -}}
{{- else -}}
  {{- $cookieSecret = randAlphaNum 32 -}}
{{- end -}}
{{- if or $hasOidcSecret $hasPostgres $hasApiKey true -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "headscale.fullname" . }}-secrets
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
type: Opaque
stringData:
  headplane-cookie-secret: {{ $cookieSecret | quote }}
  {{- if $hasOidcSecret }}
  oidc-client-secret: {{ .Values.headscale.config.oidc.clientSecret | quote }}
  {{- end }}
  {{- if $hasPostgres }}
  postgres-connection-string: {{ .Values.headscale.database.postgres.connectionString | quote }}
  {{- end }}
  {{- if $hasApiKey }}
  headplane-api-key: {{ .Values.headplane.config.apiKey | quote }}
  {{- end }}
{{- end }}
