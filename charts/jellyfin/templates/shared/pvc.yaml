{{- if and .Values.persistence.media.enabled (not .Values.persistence.media.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "jellyfin.fullname" . }}-media
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
  {{- with .Values.persistence.media.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.media.accessMode | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.media.size | quote }}
  {{- with .Values.persistence.media.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}

{{- if and .Values.persistence.externalMedia.enabled (not .Values.persistence.externalMedia.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "jellyfin.fullname" . }}-external-media
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
  {{- with .Values.persistence.externalMedia.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.externalMedia.accessMode | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.externalMedia.size | quote }}
  {{- with .Values.persistence.externalMedia.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
